<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'IPAGothic', 'DejaVu Sans', sans-serif">
  <!-- Background -->
  <rect width="1200" height="720" fill="#f5efe6"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="22" font-weight="600" fill="#2b2b2b">Value Proposition Canvas v1 — sushi yam / web3 概論 2026 lecture3</text>
  <text x="600" y="62" text-anchor="middle" font-size="13" fill="#6b6b6b">Scene: 出動指令〜現場到着までの数分、訓練したはずの手順が思い出せず頭が真っ白になる瞬間</text>

  <!-- ===== LEFT: Value Map (Square) ===== -->
  <g>
    <!-- Outer square -->
    <rect x="80" y="110" width="460" height="460" rx="8" fill="#ffffff" stroke="#2b2b2b" stroke-width="1.5"/>
    <!-- Notch on right side to imply "snap into customer circle" -->
    <path d="M 540 290 Q 580 340, 540 390 Z" fill="#ffffff" stroke="#2b2b2b" stroke-width="1.5"/>

    <text x="310" y="138" text-anchor="middle" font-size="16" font-weight="600" fill="#2b2b2b">Value Map (作る側)</text>

    <!-- Products & Services (top half) -->
    <line x1="80" y1="160" x2="540" y2="160" stroke="#cfc8bd" stroke-width="1"/>
    <text x="100" y="182" font-size="13" font-weight="600" fill="#7a5a30">Products &amp; Services</text>
    <text x="100" y="208" font-size="13" fill="#2b2b2b">★ 出動リコール（Dispatch Recall）</text>
    <text x="100" y="226" font-size="11" fill="#5b5b5b">  現場/任務タイプを選ぶと、自分が訓練した</text>
    <text x="100" y="244" font-size="11" fill="#5b5b5b">  手順を要点だけ 1 画面で表示する</text>
    <text x="100" y="262" font-size="11" fill="#5b5b5b">  シングルページ web アプリ。出動前の</text>
    <text x="100" y="280" font-size="11" fill="#5b5b5b">  数十秒で「今回やること」を取り戻す。</text>

    <!-- Divider -->
    <line x1="80" y1="310" x2="540" y2="310" stroke="#cfc8bd" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Pain Relievers (bottom-left) -->
    <text x="100" y="334" font-size="13" font-weight="600" fill="#a23a3a">Pain Relievers</text>
    <text x="100" y="356" font-size="11" fill="#2b2b2b">★ 現場タイプ別「今回の手順チェックリスト」</text>
    <text x="100" y="372" font-size="11" fill="#5b5b5b">  を 1 画面で即表示(最小ステップ・上から順)</text>
    <text x="100" y="392" font-size="11" fill="#2b2b2b">・ 前回その手順を訓練したメモ 1 行を上に表示</text>
    <text x="100" y="412" font-size="11" fill="#2b2b2b">・ 「最低限ここだけは」を太字で固定 → 抜け防止</text>

    <!-- Gain Creators (bottom-right area) -->
    <text x="100" y="450" font-size="13" font-weight="600" fill="#3a6a3a">Gain Creators</text>
    <text x="100" y="472" font-size="11" fill="#2b2b2b">★ 訓練するたび 1 行記録 → 訓練履歴が累積</text>
    <text x="100" y="488" font-size="11" fill="#5b5b5b">  現場タイプ別の回数・最終訓練日が見える</text>
    <text x="100" y="508" font-size="11" fill="#2b2b2b">・ 出動後 1 行ふりかえり → 次の訓練優先度へ</text>
    <text x="100" y="528" font-size="11" fill="#2b2b2b">・ 「最近やってない手順」を自動で目立たせる</text>
    <text x="100" y="548" font-size="9" fill="#a23a3a">★ = MVP の出発点</text>
  </g>

  <!-- ===== RIGHT: Customer Profile (Circle) ===== -->
  <g>
    <circle cx="860" cy="340" r="240" fill="#ffffff" stroke="#2b2b2b" stroke-width="1.5"/>

    <text x="860" y="138" text-anchor="middle" font-size="16" font-weight="600" fill="#2b2b2b">Customer Profile (顧客)</text>
    <text x="860" y="158" text-anchor="middle" font-size="11" fill="#6b6b6b">= 本業を持つ消防団 / ボランティア消防のメンバー(訓練が低頻度)</text>

    <!-- Customer Jobs (top of circle) -->
    <text x="860" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#2b6b8a">Customer Jobs</text>
    <text x="860" y="222" text-anchor="middle" font-size="11" fill="#2b2b2b">★ 出動時に必要な手順を素早く思い出して安全に動く</text>
    <text x="860" y="240" text-anchor="middle" font-size="11" fill="#5b5b5b">・ 訓練で学んだことを実戦の瞬間に引き出せる状態に</text>
    <text x="860" y="258" text-anchor="middle" font-size="11" fill="#5b5b5b">・ 訓練を忘れず積み上げ、次の訓練・出動につなげる</text>

    <!-- Divider line through circle -->
    <line x1="660" y1="340" x2="1060" y2="340" stroke="#cfc8bd" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Pains (bottom-left of circle) -->
    <text x="760" y="368" text-anchor="middle" font-size="13" font-weight="600" fill="#a23a3a">Pains</text>
    <text x="760" y="390" text-anchor="middle" font-size="11" fill="#2b2b2b">★ 出動の瞬間、訓練した</text>
    <text x="760" y="406" text-anchor="middle" font-size="11" fill="#2b2b2b">手順が思い出せない</text>
    <text x="760" y="430" text-anchor="middle" font-size="11" fill="#5b5b5b">・ 前回の訓練と今の自分が</text>
    <text x="760" y="446" text-anchor="middle" font-size="11" fill="#5b5b5b">  接続できない</text>
    <text x="760" y="470" text-anchor="middle" font-size="11" fill="#5b5b5b">・ 何が訓練済みで何が</text>
    <text x="760" y="486" text-anchor="middle" font-size="11" fill="#5b5b5b">  不安か把握できていない</text>

    <!-- Gains (bottom-right of circle) -->
    <text x="960" y="368" text-anchor="middle" font-size="13" font-weight="600" fill="#3a6a3a">Gains</text>
    <text x="960" y="390" text-anchor="middle" font-size="11" fill="#2b2b2b">★ 「今回やる手順」を</text>
    <text x="960" y="406" text-anchor="middle" font-size="11" fill="#2b2b2b">1 画面で確認でき動ける</text>
    <text x="960" y="430" text-anchor="middle" font-size="11" fill="#5b5b5b">・ 訓練履歴が現場タイプ別</text>
    <text x="960" y="446" text-anchor="middle" font-size="11" fill="#5b5b5b">  に見える</text>
    <text x="960" y="470" text-anchor="middle" font-size="11" fill="#5b5b5b">・ 経験が浅くても最低限を</text>
    <text x="960" y="486" text-anchor="middle" font-size="11" fill="#5b5b5b">  外さない安心感</text>

    <text x="860" y="555" text-anchor="middle" font-size="9" fill="#a23a3a">★ = 最重要 1 つ(MVP の出発点)</text>
  </g>

  <!-- Fit arrows between Pain Relievers ↔ Pains, Gain Creators ↔ Gains -->
  <g stroke="#a23a3a" stroke-width="1" fill="none" opacity="0.5">
    <path d="M 540 360 Q 600 360, 660 390" marker-end="url(#arrow-red)"/>
  </g>
  <g stroke="#3a6a3a" stroke-width="1" fill="none" opacity="0.5">
    <path d="M 540 470 Q 620 460, 720 470 Q 820 460, 920 420" marker-end="url(#arrow-green)"/>
  </g>

  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a23a3a"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3a6a3a"/>
    </marker>
  </defs>

  <!-- Footnote -->
  <text x="600" y="660" text-anchor="middle" font-size="11" fill="#6b6b6b">★ Fit: 「思い出せない痛み」 → 「現場タイプ別チェックリスト 1 画面」 / 「訓練を積み上げたい」 → 「訓練 1 行記録 + 累積表示」</text>
  <text x="600" y="680" text-anchor="middle" font-size="10" fill="#9a9a9a">VPC v1 — 13 週間アップデートしていく自分用キャンバス。提出は GitHub のみ、Google スライドは個人作業用。</text>
  <text x="600" y="698" text-anchor="middle" font-size="9" fill="#bcbcbc">個人の訓練リコール補助(公式手順を置き換えるものではない) / Generated as SVG, PNG が必要な場合は別途エクスポート</text>
</svg>
